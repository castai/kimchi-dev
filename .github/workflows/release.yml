name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          playwright: "true"

      - name: Build
        run: pnpm run build

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Test
        run: pnpm run test

  build:
    needs: [checks]
    strategy:
      matrix:
        include:
          - target: bun-darwin-x64
            os: darwin
            arch: amd64
            runner: macos-15
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            runner: macos-15
          - target: bun-linux-x64
            os: linux
            arch: amd64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Set version from tag
        run: node scripts/set-version.js "$GITHUB_REF_NAME"

      - name: Build TypeScript
        run: pnpm run build

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Compile standalone binary
        run: bun build src/cli.ts --compile --outfile dist/kimchi-code --external chromium-bidi --external electron

      # Bun build --compile produces binaries with an invalid code signature on macOS.
      # The kernel kills badly-signed arm64 binaries immediately (SIGKILL, exit 137).
      # Strip the corrupt signature and re-sign ad-hoc. See: https://github.com/oven-sh/bun/issues/7208
      - name: Ad-hoc sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --remove-signature dist/kimchi-code && codesign -s - dist/kimchi-code

      - name: Copy assets
        run: pnpm run copy:assets

      - name: Package binary
        run: tar -czf kimchi-code_${{ matrix.os }}_${{ matrix.arch }}.tar.gz -C dist kimchi-code package.json theme

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimchi-code_${{ matrix.os }}_${{ matrix.arch }}
          path: kimchi-code_${{ matrix.os }}_${{ matrix.arch }}.tar.gz

  smoke-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: kimchi-code_linux_amd64

      - name: Extract binary into dist/
        run: |
          mkdir -p dist
          tar -xzf kimchi-code_linux_amd64.tar.gz -C dist

      - name: Smoke tests
        run: pnpm run test:smoke

  release:
    needs: [smoke-test]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum kimchi-code_*.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/kimchi-code_*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
