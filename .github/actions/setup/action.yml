name: Setup
description: Checkout, enable corepack, setup Node.js 22, and install dependencies

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
